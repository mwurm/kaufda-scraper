publishers:
  - rewe
  - aldi süd
  - edeka
  - netto marken-discount
  - lidl
  - penny
# "rewe", "edeka", "lidl", "Netto Marken-Discount", "Penny", "Metro"]]
articles:
  Fleisch🥩:
    - Ente
    - Lamm
    - Hirsch
    - Dorade
    - Rinderfilet
    - Burger:
        multisearch:
          - Burger
          - Patties
        match_none:
          - Fertiggericht
          - vegan
          - Garden Gourmet
          - Trolli
    - Weißwurst:
        match_none:
          - vegan
          - Garden Gourmet
    - Rinderhüftsteak:
        multisearch:
          - Rinderhüftsteak
          - Rindersteakhüfte
    - Rumpsteak
    - Cevapcici:
        match_none:
          - vegan
    - Schweinefilet:
        match_none:
          - Rippchen
          - vegan
          - Spanferkel
    - Entrecote
    - Roastbeef
    - Rinderroulade:
        multisearch:
          - Roulade
    - Rindergulasch:
        multisearch:
          - Gulasch
        match_any:
          - (Rind|Jungbulle).*Gulasch
          - Gulasch.*(Rind|Jungbulle)
        match_none:
          - Kalb
    - Schweinegulasch:
        multisearch:
          - Gulasch
        match_any:
          - Schwein.*Gulasch
          - Gulasch.*Schwein

    - falsches Filet
    - Chorizo
    - Wiener:
        match_none:
          - vegan
          - vegetarisch
          - Geflügel
          - Hähnchen
    - Beinscheibe:
        match_any:
          - Beinscheibe.*Rind
          - Rind.*Beinscheibe
    - Leberkäs-Bret:
        multisearch:
          - Leberkäs
        match_any:
          - roh\b  # "roh", aber nicht "Strohschwein"
          - Bret

  "Geflügel🍗":
    - Hähnchenbrustfilet:
        multisearch:
          - Hähnchenbrust
          - Hähnchenbrustfilet
        match_any:
          - Hähnchen[-]?brust[-]?[filet]?
        match_none:
          - Fertiggericht
          - vegan
    - Putenschnitzel
    - Hähnchengeschnetzeltes
    - Putengeschnetzeltes

  "Fisch & Meeresfrüchte🐟":
    - Thunfisch
    - "Lachs geräuchert":
        multisearch:
          - Lachs
          - Lachsforelle
        match_any:
          - Lachs.*räucher
    - "Lachsfilet":
        multisearch:
          - Lachs
          - Lachsforelle
        match_any:
          - Lachs.*filet
        match_none:
          - räucher
          - panier
    - Fischstäbchen
    - Backfisch:
        match_none:
          - Fischstäbchen

  Feinkost🫒:
    - D'arbo
    - Maultaschen
    - Pelmeni
    - Pesto
    - Barilla Pasta:
        multisearch:
          - Pasta
        match_any:
          - Barilla.*Pasta
          - Pasta.*Barilla
    - Olivenöl
    - "Senf Händlmaier/Develey/Kühne":
        multisearch:
          - Händlmaier
          - Develey
          - Kühne
        match_any:
          - Senf
        match_none:
          - Fleisch

  "Obst & Gemüse🍎🫑":
    - Ananas:
        match_none:
          - Saft
          - Dose
          - Konserve

    - Maracuja
    - Spargel
    - Heidelbeeren
    - Erdbeeren
    - Himbeeren
  Backwaren🥖🥨:
    - Golden Toast

  Milchprodukte🧀:
    - Käsefavoriten weich:
        multisearch:
          - Chaumes
          - Saint Albray
          - Rustique
    - Käsefavoriten hart:
        multisearch:
          - Appenzeller
          - Scharfer Max
          - Bergkäse
        match_none:
          - Scheiben

    - Butter:
        match_none:
          - Butter milch
          - Buttermilch
          - Butteralternative
          - vegan
    - Skyr:
        match_none:
          - vegan
          - Drink

    - Griechischer Joghurt:
        match_none:
          - vegan

    - Schlagsahne:
        match_none:
          - vegan
          - Kochsahne
          - laktosefrei
  "Süßwaren🍫":
    - Lindt Tafel:
        multisearch:
          - Lindt
        match_any:
          - Lindt.*Tafel
          - Tafel.*Lindt
    - "Milka Tafel":
        multisearch:
          - Milka
        match_any:
          - Milka.*Tafel
          - Tafel.*Milka
    - Toffifee
    - Nutella

  Sonstiges:
    - "Ben & Jerry":
        multisearch:
          - Jerry
        match_any:
          - Ben.*Jerry.*Eis
          - Eis.*Ben.*Jerry
    - Magnum Eis:
        multisearch:
          - Magnum
        match_any:
          - Magnum.*Eis
          - Eis.*Magnum
    - Cracker TUC/Wasa:
        multisearch:
          - Cracker"
        match_any:
          - cracker.*(tuc|wasa)
          - (tuc|wasa).*cracker
  Getränke🍻:
    - Gin:
        multisearch:
          - Gin
        match_any:
          - Alkoholische Getränke
    - Augustiner/Tegernseer/Ayinger:
        multisearch:
          - Augustiner
          - Tegernseer
          - Ayinger
        match_any:
          - (Augustiner|Tegernseer|Ayinger)
    - Bier
    - Oettinger
    - Jever Fun:
        multisearch:
          - Jever
        match_any:
          - Fun
    - Wodka:
        match_none:
          - Mischgetränk
    - Lillet
    - Campari
    - Aperol
  Sonderartikel:
    - Bartschneider:
        match_any:
          - Bart[-]?schneider
          - Bart[-]?trimmer
          - Haar[-]?schneider
          - Haar[-]?trimmer
